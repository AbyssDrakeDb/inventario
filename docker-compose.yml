version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: inventario-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventario
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventario-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/inventario?schema=public
      JWT_SECRET: inventario-secret-key-change-in-production
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inventario-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata: